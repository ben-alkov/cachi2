# Note: to format this file, please install [https://github.com/tox-dev/tox-ini-fmt]
# Based *very* closely on https://www.seanh.cc/2018/11/14/tox ("An Opinionated tox.ini File")

[tox]
requires =
    tox>=4.2
env_list =
    integration
    py3{11,10,9}
    flake8
    bandit
    black
    isort
    mypy
    unittest

[testenv]
description =
    bandit: bandit security scanner
    black: black formatter checks [Mandatory]
    flake8: flake8 linter
    integration: run Cachi2 integration tests with system Python (from venv)
    isort: isort formatter checks
    mypy: mypy type checker
    py39: run Cachi2 unit tests with Python 3.9
    py310: run Cachi2 unit tests with Python 3.10
    py311: run Cachi2 unit tests with Python 3.11
    unittest: run Cachi2 unit tests with system Python (from venv)
package = editable
deps =
    {flake8,bandit,black,integration,isort,mypy,py39,py310,py311,unittest}: -rrequirements-extras.txt
pass_env =
    TOX_ENV_DIR
    integration: CACHI2_GENERATE_TEST_DATA
    integration: CACHI2_IMAGE
set_env =
    CACHITO_TESTING = true
    PROMETHEUS_MULTIPROC_DIR = {envtmpdir}/prometheus_metrics
commands =
    bandit: bandit -r {[vars]source_dir}
    black: black --check --diff {[vars]source_dir} {[vars]tests_dir} {[vars]utils_dir}
    flake8: flake8 {[vars]source_dir} {[vars]tests_dir} {[vars]utils_dir}
    {integration,py39,py310,py311,unittest}: python -m pip install pytest-html
    integration: pytest -rA -vvvv --confcutdir={[vars]tests_dir}/integration --log-cli-level=DEBUG --html=htmlcov/latest-integration-test-report.html {[vars]tests_dir}/integration {posargs}
    isort: isort --profile=black -l=100 --check --diff --color {[vars]source_dir} {[vars]tests_dir} {[vars]utils_dir}
    mypy: mypy --install-types --non-interactive {[vars]source_dir} {[vars]tests_dir} {[vars]utils_dir}
    {py39,py310,py311,unittest}: pytest --ignore {[vars]tests_dir}/integration --cov={[vars]source_dir} --cov-config=pyproject.toml --cov-report term --cov-report html --cov-report xml --html=htmlcov/latest-unit-test-report.html {posargs}
    {py39,py310,py311,unittest}: coverage html
commands_post =
    rm -rf {envtmpdir}/prometheus_metrics
skip_install =
    {flake8,bandit,black,isort,integration}: true
skipsdist =
    integration: true
allowlist_externals =
    make
    mkdir
    rm

[vars]
source_dir = cachi2
tests_dir = tests
utils_dir = utils
bin_dir = bin

[flake8]
exclude =
    venv,.git,.tox,dist,*egg,.env,hack
ignore =
    D100,D104,D105,W503,E203,E501
per-file-ignores =
    tests/*:D101,D102,D103
show-source = True

[gh-actions]
python =
    3.9: py39
    3.10: py310
    3.11: py311

[pytest]
addopts = -vv --tb=native --verbose
log_date_format = %Y-%m-%d %H:%M:%S
log_format = %(asctime)s %(levelname)s %(message)s
testpaths =
    tests
